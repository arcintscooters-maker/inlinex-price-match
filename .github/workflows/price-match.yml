name: Price Match

on:
  schedule:
    - cron: '23 3 * * 1'  # Every Monday at 3:23 AM UTC (offset to avoid :00)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (calculate but do not update prices)'
        type: boolean
        default: false
      brands:
        description: 'Comma-separated brands to match (empty = all)'
        type: string
        default: ''

permissions:
  contents: write

jobs:
  price-match:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run price matching
        id: match
        env:
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ inputs.brands }}" ]; then
            ARGS="$ARGS --brands=${{ inputs.brands }}"
          fi
          node price-match.js $ARGS

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: price-match-report-${{ github.run_number }}
          path: reports/*.xlsx
          retention-days: 90

      - name: Commit status and price history
        if: always()
        run: |
          git config user.name "Price Match Bot"
          git config user.email "bot@inlinex.com.sg"
          git add price-history.json docs/status.json
          git diff --staged --quiet || git commit -m "Update price data [skip ci]"
          git pull --rebase
          git push
